<html lang="ja">
  <head>
    <meta charset="UTF-8" />

      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no"
    />

    <link rel="icon" href="./statics/signage-192.png" sizes="any" />
